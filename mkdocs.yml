# Project information
site_name: Word of the Day
site_url: https://sawyerrensel.github.io/WOTD
site_description: Learn a new word every day, right inside Obsidian.

# Repository
repo_name: SawyerRensel/WOTD
repo_url: https://github.com/SawyerRensel/WOTD

# Copyright
copyright: "&copy; 2026 Sawyer Rensel"

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: lucide/moon-star
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

# Plugins
plugins:
  - search
  - tags

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Configuration:
    - configuration/index.md
    - Settings: configuration/settings.md
    - Callout Styles: configuration/callout-styles.md
  - Osmosis Integration:
    - osmosis/index.md
    - Flashcard Types: osmosis/flashcard-types.md
    - Decks: osmosis/decks.md
  - Changelog: changelog.md
